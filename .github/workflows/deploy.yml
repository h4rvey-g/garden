name: Deploy Quartz site to GitHub Pages

on:
  schedule:
    - cron: '0 0 */2 * *'
  push:
    branches:
      - v4
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout garden repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout ob-Notes repository
        uses: actions/checkout@v4
        with:
          repository: h4rvey-g/ob-Notes
          path: content
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Clean up content directory
        run: |
          rm -rf content/.git
          rm -rf content/.github
          rm -rf content/.obsidian
          rm -f content/.DS_Store
          rm -f content/.obsidian.vimrc
          rm -rf content/.smtcmp_chat_histories
          rm -f content/.smtcmp_vector_db.tar.gz
          rm -rf content/.trash
          rm -f content/sync.ffs_db

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
